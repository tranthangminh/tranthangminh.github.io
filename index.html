<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Test Web</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; }
    button { padding: 10px 20px; }
  </style>
</head>
<body>

  <h1>Hello mày 😎</h1>
  <button onclick="clickMe()">Click tao đi</button>

  <p id="text"></p>

  <script>
    function clickMe() {
      document.getElementById("text").innerText = "Đã click 😏";
    }
  </script>

</body>
</html>
