<body class="actor-page-view artist-page-view">
<div id="sharedHeaderRoot"></div>

<main class="artist-page-main">
    <div class="content-wrap artist-hero">
        <h2 class="page-breadcrumb">
            <a class="page-breadcrumb-link" href="../index.html">Trang Chủ</a>
            <span class="page-breadcrumb-sep">&gt;</span>
            <span>Họa Sĩ</span>
        </h2>

        <section class="artist-intro-card surface-card">
            <div class="artist-intro-copy">
                <h1 class="artist-section-title">Thông tin cơ bản</h1>
                <p class="artist-summary">
                    Mình làm việc ở cả hai hướng 2D và 3D, tập trung vào bố cục, cảm xúc thị giác và tính ứng dụng thực tế.
                    Quy trình luôn ưu tiên việc lên ý tưởng rõ ràng, giữ chất lượng đầu ra ổn định và tối ưu để có thể tái sử dụng cho nhiều dự án khác nhau.
                </p>
            </div>
            <div class="artist-switch" role="tablist" aria-label="Chọn nhóm tác phẩm">
                <button class="artist-switch-btn is-active" id="artistTab2d" type="button" data-medium="2d" aria-pressed="true">2D</button>
                <button class="artist-switch-btn" id="artistTab3d" type="button" data-medium="3d" aria-pressed="false">3D</button>
            </div>
        </section>
    </div>

    <div class="content-wrap gallery-full-bleed-wrap artist-gallery-wrap">
        <section class="artist-gallery masonry-gallery masonry-gallery--mobile-two" id="artistGallery" aria-label="Bộ sưu tập họa sĩ"></section>
    </div>
</main>

<div id="sharedContactRoot"></div>
<div id="sharedBookNowRoot"></div>
<div id="sharedLightboxRoot"></div>

<script src="../js/pages/artist.js?v=20260405-4"></script>
