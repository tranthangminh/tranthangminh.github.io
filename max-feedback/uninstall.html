<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I'm Sorry to See You Go - MAX Design Power-Pack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <style>
    :root {
      --bg-primary: #030712;
      --bg-secondary: rgba(17, 24, 39, 0.7);
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient Background Glows */
    body::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.08) 0%, rgba(3, 7, 18, 0) 70%);
      top: -10%;
      left: -10%;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 242, 254, 0.08) 0%, rgba(3, 7, 18, 0) 70%);
      bottom: -10%;
      right: -10%;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 650px;
      padding: 40px 24px;
      z-index: 1;
      position: relative;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeInDown 0.8s ease-out;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 10px rgba(177, 159, 251, 0.4));
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff 40%, var(--accent-pink) 70%, var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Feedback Card Form */
    .form-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 36px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-main);
    }

    /* Custom Checkboxes */
    .reasons-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 480px) {
      .reasons-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .checkbox-label:hover {
      color: var(--text-main);
    }

    .checkbox-input {
      accent-color: var(--accent-cyan);
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Textarea */
    .textarea-input {
      width: 100%;
      height: 120px;
      background-color: rgba(3, 7, 12, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px;
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .textarea-input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 2px rgba(0, 242, 254, 0.15);
    }

    /* Action Buttons Row */
    .actions-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 32px;
    }

    @media (min-width: 520px) {
      .actions-row {
        flex-direction: row;
      }
    }

    .btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      outline: none;
    }

    /* Direct Submit (Serverless POST) */
    .btn-submit {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
      color: #030712;
      border: none;
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 242, 254, 0.35);
      opacity: 0.95;
    }

    /* Mailto Client Option */
    .btn-email {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }

    .btn-email:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--text-muted);
      transform: translateY(-2px);
    }

    /* Success message state */
    .success-panel {
      display: none;
      text-align: center;
      padding: 20px 0;
    }

    .success-icon {
      font-size: 3rem;
      color: var(--accent-cyan);
      margin-bottom: 16px;
    }

    .success-text h3 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .success-text p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    /* Keyframes */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img class="logo" src="svg/logo-MAX.svg" alt="MAX Logo">
      <h1>I'm sorry to see you go!</h1>
      <p class="subtitle">Please take a moment to tell me why you uninstalled MAX so I can improve the tool.</p>
    </header>

    <div class="form-card">
      <form id="feedback-form" action="https://formspree.io/f/mkolvjew" method="POST">
        <div id="form-fields">
          <div class="form-group">
            <label class="form-label">Why are you uninstalling?</label>
            <div class="reasons-grid">
              <label class="checkbox-label">
                <input type="checkbox" name="reason" value="Too difficult to use" class="checkbox-input">
                <span>Difficult to use</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="reason" value="No longer needed" class="checkbox-input">
                <span>No longer needed</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="reason" value="Found a better extension" class="checkbox-input">
                <span>Found a better tool</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="reason" value="Bugs/Not working properly" class="checkbox-input">
                <span>Encountered bugs</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="reason" value="Performance issues" class="checkbox-input">
                <span>Performance issues</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="reason" value="Other" class="checkbox-input">
                <span>Other reason</span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="details">Can you share more details? (optional)</label>
            <textarea id="details" name="details" class="textarea-input" placeholder="Tell me what I can improve, or specify the bugs you encountered..."></textarea>
          </div>

          <div class="actions-row">
            <!-- Submit directly using Web API POST (Anonymous / No mail client setup needed) -->
            <button type="submit" class="btn btn-submit" id="submit-direct-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
              <span>Submit Feedback</span>
            </button>

            <!-- Predefined Email mailto trigger (Fallback opens local Mail Client) -->
            <button type="button" class="btn btn-email" id="submit-email-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
              <span>Send via Email</span>
            </button>
          </div>
        </div>

        <!-- Success Message Pane -->
        <div id="success-pane" class="success-panel">
          <div class="success-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          </div>
          <div class="success-text">
            <h3>Thank You!</h3>
            <p>Your feedback has been submitted successfully. I appreciate your input and will use it to make MAX better.</p>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="uninstall.js"></script>
</body>
</html>
